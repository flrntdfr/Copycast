server:
  port: 8080

spring:
  application:
    name: copycast

vaadin:
  launch-browser: false

copycast:
  # Public base URL used for enclosure links in Mirror Feeds.
  base-url: "http://localhost:8080"
  # Where all state lives (filesystem-as-state, see docs/adr/0001).
  data-dir: "data"
  # Scheduled Refresh cadence per Mirror.
  refresh-hours: 24
  # Cooldown for Refreshes triggered by a fetch of the Mirror Feed.
  fetch-cooldown-minutes: 15
  ytdlp:
    # Pinned yt-dlp release (see docs/adr/0002). The Docker build greps this
    # value and bakes the matching binary into the image. Bump + rebuild, or
    # bump + restart (the runtime falls back to downloading the new pin).
    version: "2026.06.09"
    # Where the Docker image ships the bundled binary.
    bundled-dir: "/opt/copycast/bin"
    # Fallback: download the pinned binary when no bundled/cached one matches.
    auto-download: true
